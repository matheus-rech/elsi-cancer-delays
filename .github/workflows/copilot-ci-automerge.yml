name: Copilot CI Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'copilot/fix-')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge on fix PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUM" --auto --merge --repo "$REPO"
